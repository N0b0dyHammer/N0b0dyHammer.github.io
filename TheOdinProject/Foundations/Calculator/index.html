<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <div class="line" id="result"><p id="print"> </p></div>
        <div class="line" id="firstLine">
            <button class="digit", id="cancel">C</button>
            <button class="digit", id="return"><=</button>
        </div>
        <div class="line">
            <button class="digit" id="seven">7</button>
            <button class="digit" id="eight">8</button>
            <button class="digit" id="nine">9</button>
            <button class="operation" id="divide">÷</button>
        </div>
        <div class="line">
            <button class="digit" id="four">4</button>
            <button class="digit" id="five">5</button>
            <button class="digit" id="six">6</button>
            <button class="operation" id="multiply">&times;</button>
        </div>
        <div class="line">
            <button class="digit" id="one">1</button>
            <button class="digit" id="two">2</button>
            <button class="digit" id="three">3</button>
            <button class="operation" id="add">+</button>
        </div>
        <div class="line">
            <button class="digit" id="sign">±</button>
            <button class="digit" id="zero">0</button>
            <button class="digit" id="point">.</button>
            <button class="operation" id="evaluate">=</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
